<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Yellow background circle -->
  <circle cx="40" cy="40" r="38" fill="#FFE01B"/>
  <!-- Chimp head shape -->
  <ellipse cx="40" cy="44" rx="22" ry="20" fill="#1A1A1A"/>
  <!-- Ears -->
  <circle cx="17" cy="40" r="8"  fill="#1A1A1A"/>
  <circle cx="63" cy="40" r="8"  fill="#1A1A1A"/>
  <!-- Inner ear -->
  <circle cx="17" cy="40" r="4"  fill="#5C3A1E"/>
  <circle cx="63" cy="40" r="4"  fill="#5C3A1E"/>
  <!-- White eye areas -->
  <ellipse cx="32" cy="38" rx="5" ry="6" fill="white"/>
  <ellipse cx="48" cy="38" rx="5" ry="6" fill="white"/>
  <!-- Eyes -->
  <circle cx="32" cy="39" r="3" fill="#1A1A1A"/>
  <circle cx="48" cy="39" r="3" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <circle cx="33" cy="38" r="1" fill="white"/>
  <circle cx="49" cy="38" r="1" fill="white"/>
  <!-- Muzzle/snout -->
  <ellipse cx="40" cy="52" rx="10" ry="8" fill="#5C3A1E"/>
  <!-- Nostrils -->
  <circle cx="36" cy="51" r="2" fill="#1A1A1A"/>
  <circle cx="44" cy="51" r="2" fill="#1A1A1A"/>
  <!-- Smile -->
  <path d="M33 57 Q40 63 47 57" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <!-- Hat brim -->
  <rect x="20" y="21" width="40" height="5" rx="2" fill="#1A1A1A"/>
  <ellipse cx="40" cy="21" rx="14" ry="12" fill="#1A1A1A"/>
</svg>
